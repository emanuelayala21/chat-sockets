<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Distribuido — Sockets TCP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0A0E1A;
      color: #F8FAFC;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── LOGIN ─────────────────────────────────────────── */
    #login {
      background: #111827;
      border: 1px solid #1E3A5F;
      border-radius: 12px;
      padding: 40px;
      width: 360px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    #login .logo {
      font-size: 32px;
      margin-bottom: 8px;
    }

    #login h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #F8FAFC;
    }

    #login p {
      font-size: 13px;
      color: #94A3B8;
      margin-bottom: 28px;
    }

    #login input {
      width: 100%;
      background: #0A0E1A;
      border: 1px solid #1E3A5F;
      border-radius: 8px;
      padding: 12px 16px;
      color: #F8FAFC;
      font-size: 15px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    #login input:focus { border-color: #3B82F6; }

    #login button {
      width: 100%;
      background: #1D4ED8;
      border: none;
      border-radius: 8px;
      padding: 13px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    #login button:hover { background: #2563EB; }

    #login .error {
      color: #EF4444;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    /* ── CHAT ──────────────────────────────────────────── */
    #chat {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 720px;
      height: 100vh;
      padding: 16px;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: #111827;
      border: 1px solid #1E3A5F;
      border-radius: 12px 12px 0 0;
    }

    .status-dot {
      width: 10px; height: 10px;
      background: #10B981;
      border-radius: 50%;
      box-shadow: 0 0 8px #10B981;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .chat-header h2 { font-size: 16px; font-weight: 700; flex: 1; }

    .chat-header .user-tag {
      background: #1E3A5F;
      color: #06B6D4;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #0D1321;
      border-left: 1px solid #1E3A5F;
      border-right: 1px solid #1E3A5F;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: #0A0E1A; }
    .messages::-webkit-scrollbar-thumb { background: #1E3A5F; border-radius: 3px; }

    .msg {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
      max-width: 85%;
      word-break: break-word;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.own {
      background: #1D4ED8;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 3px;
    }

    .msg.other {
      background: #1A2236;
      color: #F8FAFC;
      align-self: flex-start;
      border-bottom-left-radius: 3px;
    }

    .msg.system {
      background: transparent;
      color: #475569;
      font-size: 12px;
      font-style: italic;
      align-self: center;
      text-align: center;
    }

    .msg .sender {
      font-size: 11px;
      font-weight: 700;
      color: #06B6D4;
      margin-bottom: 3px;
    }

    .chat-input-area {
      display: flex;
      gap: 10px;
      padding: 14px;
      background: #111827;
      border: 1px solid #1E3A5F;
      border-top: none;
      border-radius: 0 0 12px 12px;
    }

    .chat-input-area input {
      flex: 1;
      background: #0A0E1A;
      border: 1px solid #1E3A5F;
      border-radius: 8px;
      padding: 11px 16px;
      color: #F8FAFC;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input-area input:focus { border-color: #3B82F6; }

    .chat-input-area button {
      background: #1D4ED8;
      border: none;
      border-radius: 8px;
      padding: 11px 20px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .chat-input-area button:hover { background: #2563EB; }
    .chat-input-area button:disabled { background: #1E3A5F; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login">
    <div class="logo">💬</div>
    <h1>Chat Distribuido</h1>
    <p>Sockets TCP · Universidad Latina · 2026</p>
    <input id="nameInput" type="text" placeholder="Tu nombre de usuario" maxlength="20" autofocus>
    <button onclick="connect()">Conectar</button>
    <div class="error" id="errorMsg"></div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div class="chat-header">
      <div class="status-dot"></div>
      <h2>Chat Distribuido — Sockets TCP</h2>
      <span class="user-tag" id="userTag"></span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="chat-input-area">
      <input id="msgInput" type="text" placeholder="Escribe un mensaje..." maxlength="300" disabled>
      <button id="sendBtn" onclick="sendMessage()" disabled>Enviar</button>
    </div>
  </div>

  <script>
    let ws = null;
    let myName = "";

    function connect() {
      const nameInput = document.getElementById("nameInput");
      const name = nameInput.value.trim();

      if (!name) {
        showError("Ingresa un nombre de usuario.");
        return;
      }

      myName = name;
      const host = window.location.hostname || "localhost";
      ws = new WebSocket(`ws://${host}:5555`);

      ws.onopen = () => {
        ws.send(name);
        document.getElementById("login").style.display = "none";
        document.getElementById("chat").style.display = "flex";
        document.getElementById("userTag").textContent = name;
        document.getElementById("msgInput").disabled = false;
        document.getElementById("sendBtn").disabled = false;
        document.getElementById("msgInput").focus();
      };

      ws.onmessage = (event) => {
        const text = event.data;
        const isSystem = text.startsWith("[Servidor]");
        const isOwn = text.startsWith(`[${myName}]:`);
        addMessage(text, isSystem ? "system" : isOwn ? "own" : "other");
      };

      ws.onclose = () => {
        addMessage("[Servidor] Conexión cerrada.", "system");
        document.getElementById("msgInput").disabled = true;
        document.getElementById("sendBtn").disabled = true;
      };

      ws.onerror = () => {
        document.getElementById("login").style.display = "flex";
        document.getElementById("chat").style.display = "none";
        showError("No se pudo conectar al servidor. ¿Está corriendo?");
      };
    }

    function sendMessage() {
      const input = document.getElementById("msgInput");
      const text = input.value.trim();
      if (!text || !ws) return;
      ws.send(text);
      addMessage(`[${myName}]: ${text}`, "own");
      input.value = "";
    }

    function addMessage(text, type) {
      const container = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `msg ${type}`;

      if (type === "other") {
        const match = text.match(/^\[(.+?)\]: (.+)$/);
        if (match) {
          div.innerHTML = `<div class="sender">${match[1]}</div>${match[2]}`;
        } else {
          div.textContent = text;
        }
      } else {
        const match = text.match(/^\[.+?\]: (.+)$/);
        div.textContent = match ? match[1] : text;
      }

      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function showError(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent = msg;
      el.style.display = "block";
    }

    // Enter para enviar
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        if (document.getElementById("chat").style.display === "flex") {
          sendMessage();
        } else {
          connect();
        }
      }
    });
  </script>
</body>
</html>
